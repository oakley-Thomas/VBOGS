# Explicit local-development overlay for docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --no-build
#
# Docker Compose also auto-loads docker-compose.override.yml, which mirrors this
# overlay for the plain `docker compose up` dev workflow.

services:
  vbogs-torch:
    volumes:
      - type: bind
        source: .
        target: /workspace/VBOGS
      - type: bind
        source: ${VBOGS_LOCAL_OUTPUTS:-./outputs}
        target: /workspace/VBOGS/outputs

  vbogs-jax:
    volumes:
      - type: bind
        source: .
        target: /workspace/VBOGS
      - type: bind
        source: ${VBOGS_LOCAL_OUTPUTS:-./outputs}
        target: /workspace/VBOGS/outputs

  vbogs-pipeline:
    environment:
      VBOGS_PIPELINE_CONFIG: ${VBOGS_PIPELINE_CONFIG:-pipeline_config.dev.yaml}
    volumes:
      - type: bind
        source: .
        target: /workspace/VBOGS
      - type: bind
        source: ${VBOGS_LOCAL_OUTPUTS:-./outputs}
        target: /workspace/VBOGS/outputs
