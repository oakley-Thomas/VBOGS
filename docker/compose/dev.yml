# Explicit local-development overlay for docker/compose/compose.yml.
#
# Usage:
#   docker compose --project-directory . -f docker/compose/compose.yml -f docker/compose/dev.yml up -d --no-build

services:
  vbogs-torch:
    volumes:
      - type: bind
        source: .
        target: /workspace/VBOGS
      - type: bind
        source: ${VBOGS_LOCAL_OUTPUTS:-./outputs}
        target: /workspace/VBOGS/outputs

  vbogs-jax:
    volumes:
      - type: bind
        source: .
        target: /workspace/VBOGS
      - type: bind
        source: ${VBOGS_LOCAL_OUTPUTS:-./outputs}
        target: /workspace/VBOGS/outputs

  vbogs-pipeline:
    environment:
      VBOGS_PIPELINE_CONFIG: ${VBOGS_PIPELINE_CONFIG:-configs/pipeline/dev.yaml}
    volumes:
      - type: bind
        source: .
        target: /workspace/VBOGS
      - type: bind
        source: ${VBOGS_LOCAL_OUTPUTS:-./outputs}
        target: /workspace/VBOGS/outputs
